<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Volunteer • The Carpentry Collective</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="bg"></div>
  <header class="wrap header">
    <a class="brand" href="/"><span class="brand-dot"></span><span class="brand-text">The Carpentry Collective</span></a>
    <nav class="nav">
      <a href="projects.html">Projects</a>
      <a href="gallery.html">Gallery</a>
      <a href="volunteer.html">Volunteer</a>
      <a href="verification.html">Verification</a>
    </nav>
  </header>

  <main class="wrap hero">
    <section class="card">
      <h1>Volunteer registration</h1>
      <p class="lead">Register your details and we’ll contact you when projects or events match your availability.</p>

      <form name="volunteer" method="POST" data-netlify="true" action="/thank-you.html">
        <input type="hidden" name="form-name" value="volunteer" />

        <p>
          <label>Name<br />
            <input required name="name" type="text" style="width:100%;padding:12px;border-radius:12px;border:1px solid rgba(255,255,255,0.18);background:rgba(255,255,255,0.06);color:#fff;" />
          </label>
        </p>

        <p>
          <label>Email<br />
            <input required name="email" type="email" style="width:100%;padding:12px;border-radius:12px;border:1px solid rgba(255,255,255,0.18);background:rgba(255,255,255,0.06);color:#fff;" />
          </label>
        </p>

        <p>
          <label>Trade / skills<br />
            <input name="skills" type="text" style="width:100%;padding:12px;border-radius:12px;border:1px solid rgba(255,255,255,0.18);background:rgba(255,255,255,0.06);color:#fff;" />
          </label>
        </p>

        <p>
          <label>Availability / notes<br />
            <textarea name="notes" rows="5" style="width:100%;padding:12px;border-radius:12px;border:1px solid rgba(255,255,255,0.18);background:rgba(255,255,255,0.06);color:#fff;"></textarea>
          </label>
        </p>

        <div class="actions">
          <button class="btn primary" type="submit" style="cursor:pointer">Submit</button>
          <a class="btn" href="/">Back home</a>
        </div>
      </form>

      <p class="fineprint">Submissions are stored in Netlify → Site → Forms.</p>
    </section>
  </main>
</body>
</html>
